<!DOCTYPE html>
<html lang="en">
   <head>
    <title>Lab 7</title>
    <link rel="stylesheet" href="style.css">
   </head> 
   <body>
    <h1>lab 7 js events</h1>
    <div class="box">
        <h3>test</h3>
        <button id="mybtn">hover here</button>
        <p id="msg1">lab 7</p>
    </div>
    <div class="box">
        <h3>lab 7 events</h3>
        <input type="text" id="myinput" placeholder="type here">
        <p id="msg2">key:</p>
    </div>
    <div class="box">
        <h3>form test</h3>
        <form id="myform">
            <input type="text" id="namebox" placeholder="name" required>
            <input type="submit" value="submit">
        </form>
        <p id="msg3"></p>
    </div>
    <div class="box">
        <h3>focus and blur test</h3>
        <input type="text" id="focusbox" placeholder="click here">
        <p id="msg4">status: waiting</p>
    </div>
    <div class="box">
        <h3>event test</h3>
        <div id="btnbox">
            <button>one</button>
            <button>two</button>
            <button>three</button>
        </div>
        <p id="msg5">click on a number button above</p>
    </div>
    <script src="script.js"></script>
   </body>
</html>
